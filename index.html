    <!-- Preload critical Roboto fonts for optimal LCP -->
    <link
      rel="preload"
      href="/fonts/roboto-v30-latin-regular.woff2"

      type="font/woff2"
      crossorigin
    />
    <link

      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Resource hints for third-party domains -->
    <link rel="dns-prefetch" href="https://sc-market.space" />
    <link rel="dns-prefetch" href="https://sessions.bugsnag.com" />
    <link rel="preconnect" href="https://sc-market.space" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Prefetch likely next route bundles -->
    <link rel="prefetch" href="/assets/market-*.js" as="script" />
    <link rel="prefetch" href="/assets/mui-common-*.js" as="script" />

    <!-- Font optimization: Use system fonts with font-display swap -->
    <style>
      /* Prevent FOIT (Flash of Invisible Text) */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }

      /* Load Inter font with swap to prevent layout shift */
      @supports (font-variation-settings: normal) {
        body {
          font-family:
            "Inter var",
            -apple-system,
            BlinkMacSystemFont,
            "Segoe UI",
            Helvetica,
            Arial,
            sans-serif;
        }
      }
    </style>

    <!-- Preconnect to font CDN if using external fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" />

    <script language="javascript">
      // Keep in sync with src/util/assetReloadGuard.ts (same keys / limits).
      ;(function () {
        var ATTEMPTS_KEY = "scmarket_asset_reload_attempts"
        var WINDOW_START_KEY = "scmarket_asset_reload_window_start"
        var MAX_ATTEMPTS = 2
        var WINDOW_MS = 120000

        function tryEmergencyReload() {
          try {
            var now = Date.now()
            var windowStart = parseInt(sessionStorage.getItem(WINDOW_START_KEY) || "0", 10)
            var n = parseInt(sessionStorage.getItem(ATTEMPTS_KEY) || "0", 10)
            if (!windowStart || now - windowStart > WINDOW_MS) {
              windowStart = now
              n = 0
              sessionStorage.setItem(WINDOW_START_KEY, String(windowStart))
              sessionStorage.setItem(ATTEMPTS_KEY, "0")
            }
            if (n >= MAX_ATTEMPTS) return
            sessionStorage.setItem(ATTEMPTS_KEY, String(n + 1))
            window.location.reload()
          } catch (e) {}
        }

        // NOTE: we deliberately do NOT handle vite:preloadError here. That event
        // is owned by the module layer (retryDynamicImport + the handler in
        // src/index.tsx): failed route imports are retried in place first, and
        // only escalated to a reload once retries are exhausted. Reloading here
        // on the FIRST failed attempt would preempt that retry — and would also
        // reload on hover-prefetch failures, which must stay silent.
        //
        // This capture-phase listener stays for the one case the module layer
        // cannot cover: a top-level <script>/asset tag (e.g. the entry bundle
        // itself) that fails to load before src/index.tsx ever runs.
        window.addEventListener(
          "error",
          function (event) {
            if (event.target && event.target.tagName === "SCRIPT") {
              var src = (event.target.src || event.target.getAttribute("src") || "").toString()
              var isOurAsset =
                src.indexOf("/assets/") !== -1 ||
                (src.indexOf(window.location.origin) === 0 && /\.(js|mjs)$/.test(src))
              if (isOurAsset) tryEmergencyReload()
            }
          },
          true
        )
      })()
    </script>
